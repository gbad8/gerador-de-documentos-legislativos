{% extends "base.html" %}

{% block title %}Ofício {{ oficio.numero }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0 text-gdl-blue">{{ oficio }}</h2>
        <div class="d-flex gap-2">
            <a href="{% url 'oficios:generate_pdf' oficio.pk %}" class="btn btn-primary rounded-pill px-4 shadow-sm" target="_blank">Baixar PDF</a>
            <a href="{% url 'oficios:edit' oficio.pk %}" class="btn btn-outline-primary rounded-pill px-4">Editar</a>
            <a href="{% url 'oficios:delete' oficio.pk %}" class="btn btn-outline-danger rounded-pill px-4">Excluir</a>
        </div>
    </div>

    <div id="preview-area">
        {% include "oficios/_preview.html" %}
    </div>

    <div class="mt-5 mb-5 text-center">
        <a href="{% url 'oficios:list' %}" class="btn btn-outline-secondary rounded-pill px-4">← Voltar à lista</a>
    </div>
</div>
{% endblock %}
